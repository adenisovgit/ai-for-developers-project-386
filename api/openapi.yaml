openapi: 3.0.0
info:
  title: Call Booking Service API
  version: 0.0.0
tags: []
paths:
  /bookings:
    post:
      operationId: Bookings_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: The request conflicts with the current state of the server.
          content:
            text/plain:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
    get:
      operationId: Bookings_list
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
  /event-types:
    get:
      operationId: EventTypes_list
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
    post:
      operationId: EventTypes_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventType'
  /slots:
    get:
      operationId: Slots_list
      parameters:
        - name: eventTypeId
          in: query
          required: true
          schema:
            type: string
          explode: false
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          explode: false
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Slot'
components:
  schemas:
    Booking:
      type: object
      required:
        - id
        - eventTypeId
        - startTime
        - guestName
        - guestEmail
        - comment
      properties:
        id:
          type: string
          format: uuid
        eventTypeId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        guestName:
          type: string
        guestEmail:
          type: string
        comment:
          type: string
    BookingRequest:
      type: object
      required:
        - eventTypeId
        - startTime
        - guestName
        - guestEmail
        - comment
      properties:
        eventTypeId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        guestName:
          type: string
        guestEmail:
          type: string
        comment:
          type: string
    EventType:
      type: object
      required:
        - id
        - title
        - description
        - durationMinutes
        - availableFrom
        - availableTo
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
          format: int32
        availableFrom:
          type: string
          format: time
        availableTo:
          type: string
          format: time
    Slot:
      type: object
      required:
        - startTime
      properties:
        startTime:
          type: string
          format: date-time
