openapi: 3.0.0
info:
  title: Call Booking Service API
  version: 0.0.0
tags: []
paths:
  /bookings:
    post:
      operationId: Bookings_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: 0d0c61e8-b1a7-4cff-a2d6-dde1e41445c1
                eventTypeId: 7f6f0c13-5a45-43ec-8eef-89fce35a4d01
                startTime: '2026-04-06T09:00:00Z'
                guestName: Анна Иванова
                guestEmail: anna@example.com
                comment: Хочу обсудить формат сотрудничества.
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: The request conflicts with the current state of the server.
          content:
            text/plain:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
            example:
              eventTypeId: 7f6f0c13-5a45-43ec-8eef-89fce35a4d01
              startTime: '2026-04-06T09:00:00Z'
              guestName: Анна Иванова
              guestEmail: anna@example.com
              comment: Хочу обсудить формат сотрудничества.
    get:
      operationId: Bookings_list
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
              example:
                - id: 0d0c61e8-b1a7-4cff-a2d6-dde1e41445c1
                  eventTypeId: 7f6f0c13-5a45-43ec-8eef-89fce35a4d01
                  startTime: '2026-04-06T09:00:00Z'
                  guestName: Анна Иванова
                  guestEmail: anna@example.com
                  comment: Хочу обсудить формат сотрудничества.
                - id: 98b09a95-b9ce-4e06-b4ba-f4c9e7452c67
                  eventTypeId: 45ce4c0d-4708-43f6-b588-c8af0181f3ea
                  startTime: '2026-04-07T11:00:00Z'
                  guestName: Илья Петров
                  guestEmail: ilya@example.com
  /event-types:
    get:
      operationId: EventTypes_list
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
              example:
                - id: 7f6f0c13-5a45-43ec-8eef-89fce35a4d01
                  title: Знакомство
                  description: 15 минут на первый звонок и знакомство.
                  durationMinutes: 15
                  availableFrom: '09:00'
                  availableTo: '18:00'
                  color: '#3B82F6'
                - id: 45ce4c0d-4708-43f6-b588-c8af0181f3ea
                  title: Техническое интервью
                  description: Подробный технический созвон на 45 минут.
                  durationMinutes: 45
                  availableFrom: '10:00'
                  availableTo: '17:00'
                  color: '#14B8A6'
    post:
      operationId: EventTypes_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
              example:
                id: b501d860-b0d1-4b8a-92c8-4597797b6e49
                title: Разбор резюме
                description: Созвон на 30 минут по вашему резюме.
                durationMinutes: 30
                availableFrom: '09:00'
                availableTo: '18:00'
                color: '#22C55E'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventTypeCreateRequest'
            example:
              title: Разбор резюме
              description: Созвон на 30 минут по вашему резюме.
              durationMinutes: 30
              availableFrom: '09:00'
              availableTo: '18:00'
              color: '#22C55E'
  /slots:
    get:
      operationId: Slots_list
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
          explode: false
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OccupiedSlot'
              example:
                - startTime: '2026-04-06T09:30:00Z'
                  endTime: '2026-04-06T10:00:00Z'
                - startTime: '2026-04-06T12:00:00Z'
                  endTime: '2026-04-06T12:30:00Z'
components:
  schemas:
    Booking:
      type: object
      required:
        - id
        - eventTypeId
        - startTime
        - guestName
        - guestEmail
      properties:
        id:
          type: string
          format: uuid
        eventTypeId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        guestName:
          type: string
        guestEmail:
          type: string
        comment:
          type: string
    BookingRequest:
      type: object
      required:
        - eventTypeId
        - startTime
        - guestName
        - guestEmail
      properties:
        eventTypeId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        guestName:
          type: string
        guestEmail:
          type: string
        comment:
          type: string
    DurationMinutes:
      type: number
      enum:
        - 15
        - 30
        - 45
        - 60
    EventType:
      type: object
      required:
        - id
        - title
        - description
        - durationMinutes
        - availableFrom
        - availableTo
        - color
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        durationMinutes:
          $ref: '#/components/schemas/DurationMinutes'
        availableFrom:
          $ref: '#/components/schemas/HourOnlyTime'
        availableTo:
          $ref: '#/components/schemas/HourOnlyTime'
        color:
          $ref: '#/components/schemas/HexColor'
    EventTypeCreateRequest:
      type: object
      required:
        - title
        - description
        - durationMinutes
        - availableFrom
        - availableTo
        - color
      properties:
        title:
          type: string
        description:
          type: string
        durationMinutes:
          $ref: '#/components/schemas/DurationMinutes'
        availableFrom:
          $ref: '#/components/schemas/HourOnlyTime'
        availableTo:
          $ref: '#/components/schemas/HourOnlyTime'
        color:
          $ref: '#/components/schemas/HexColor'
    HexColor:
      type: string
      pattern: ^#[0-9A-Fa-f]{6}$
    HourOnlyTime:
      type: string
      pattern: ^([01][0-9]|2[0-3]):00$
    OccupiedSlot:
      type: object
      required:
        - startTime
        - endTime
      properties:
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
